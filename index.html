<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>每日喝水提醒</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #eef5fc; --card: #fff; --text: #1a3557; --text2: #6e8fad;
      --accent: #2e8cf0; --accent-lt: #dceeff; --accent-dk: #1a6fd4;
      --water: #44b8ff; --water-dk: #1890ff; --water-glow: rgba(24,144,255,.25);
      --success: #36d399; --danger: #f87171; --border: #d8e6f3;
      --shadow: 0 2px 12px rgba(26,53,87,.07); --r: 16px;
    }
    .dark {
      --bg: #0a1628; --card: #12203a; --text: #dce8f8; --text2: #6b9bc4;
      --accent: #52bbff; --accent-lt: #162a48; --accent-dk: #80d0ff;
      --water: #52bbff; --water-dk: #2090ff; --water-glow: rgba(82,187,255,.2);
      --success: #36d399; --danger: #f87171; --border: #1b3050;
      --shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    body { font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; transition:background .3s,color .3s; overflow-x:hidden; }
    .app { max-width:420px; margin:0 auto; padding:12px 14px 16px; display:flex; flex-direction:column; min-height:100vh; min-height:100dvh; gap:10px; }

    /* Header */
    .hdr { display:flex; justify-content:space-between; align-items:center; }
    .hdr h1 { font-size:20px; font-weight:700; }
    .hdr-sub { font-size:11px; color:var(--text2); }
    .hdr-r { display:flex; gap:8px; }
    .icon-btn { width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; box-shadow:var(--shadow); transition:transform .15s; }
    .icon-btn:active { transform:scale(.92); }

    /* Bottle Section */
    .bottle-sec { background:var(--card); border-radius:var(--r); padding:14px 16px 12px; box-shadow:var(--shadow); display:flex; align-items:center; gap:16px; border:1px solid var(--border); }
    .bottle-wrap { position:relative; width:72px; height:110px; flex-shrink:0; }
    .bottle-body { position:absolute; inset:0; border:2.5px solid var(--border); border-radius:8px 8px 14px 14px; overflow:hidden; background:var(--bg); }
    .bottle-cap { position:absolute; top:-12px; left:50%; transform:translateX(-50%); width:28px; height:14px; background:var(--accent); border-radius:6px 6px 0 0; z-index:2; }
    .water-fill { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(180deg,var(--water) 0%,var(--water-dk) 100%); transition:height .5s cubic-bezier(.4,0,.2,1); border-radius:0 0 11px 11px; overflow:hidden; }
    .wave-layer { position:absolute; left:-15%; width:130%; border-radius:50%; }
    .wave1 { top:-8px; height:18px; background:var(--water); animation:wave1 1.8s ease-in-out infinite; }
    .wave2 { top:-5px; height:12px; background:rgba(255,255,255,.3); animation:wave2 2.4s ease-in-out infinite; }
    .wave3 { top:-10px; left:-10%; width:120%; height:22px; background:rgba(255,255,255,.12); animation:wave3 3s ease-in-out infinite; border-radius:60%; }
    .wave4 { top:-6px; left:-8%; width:116%; height:14px; background:rgba(255,255,255,.08); animation:wave4 1.5s ease-in-out infinite; }
    .wave5 { top:-12px; left:-12%; width:124%; height:24px; background:rgba(24,144,255,.15); animation:wave5 3.6s ease-in-out infinite; border-radius:55%; }
    @keyframes wave1 { 0%,100%{transform:translateX(-8%) rotate(-2.5deg) scaleY(.85)} 25%{transform:translateX(5%) rotate(1.5deg) scaleY(1.1)} 50%{transform:translateX(8%) rotate(2.5deg) scaleY(.9)} 75%{transform:translateX(-5%) rotate(-1deg) scaleY(1.05)} }
    @keyframes wave2 { 0%,100%{transform:translateX(6%) rotate(1.5deg) scaleY(1.1)} 33%{transform:translateX(-7%) rotate(-2deg) scaleY(.85)} 66%{transform:translateX(4%) rotate(1deg) scaleY(1.05)} }
    @keyframes wave3 { 0%,100%{transform:translateX(-4%) scaleY(.75) rotate(-1deg)} 30%{transform:translateX(6%) scaleY(1.2) rotate(1.5deg)} 60%{transform:translateX(-2%) scaleY(.9) rotate(-.5deg)} }
    @keyframes wave4 { 0%,100%{transform:translateX(5%) rotate(2deg)} 50%{transform:translateX(-6%) rotate(-2deg)} }
    @keyframes wave5 { 0%,100%{transform:translateX(-3%) scaleY(.8) rotate(.5deg)} 40%{transform:translateX(5%) scaleY(1.15) rotate(-1deg)} 80%{transform:translateX(-1%) scaleY(.95) rotate(.3deg)} }
    .bottle-glow { position:absolute; inset:-3px; border-radius:10px 10px 16px 16px; opacity:0; transition:opacity .5s; box-shadow:0 0 20px var(--water-glow); pointer-events:none; }
    .bottle-glow.on { opacity:1; }
    /* Tick marks inside bottle */
    .bottle-ticks { position:absolute; inset:0; pointer-events:none; }
    .bottle-tick { position:absolute; left:3px; height:1px; background:var(--border); }
    .bottle-tick.major { height:1.5px; background:var(--text2); left:2px; }
    .bottle-tick-label { position:absolute; left:0; font-size:7px; color:var(--text2); line-height:1; white-space:nowrap; transform:translateY(-50%); }

    .progress-area { flex:1; min-width:0; }
    .progress-num { font-size:32px; font-weight:700; color:var(--accent); line-height:1; }
    .progress-num small { font-size:13px; font-weight:400; color:var(--text2); }
    .progress-sub { font-size:11px; color:var(--text2); margin-top:3px; }
    .progress-bar { margin-top:8px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--water),var(--accent)); border-radius:3px; transition:width .5s cubic-bezier(.4,0,.2,1); }

    /* Partner Mini */
    .partner-mini { margin-top:8px; display:flex; align-items:center; gap:8px; padding:6px 10px; background:var(--accent-lt); border-radius:10px; font-size:11px; color:var(--text2); }
    .partner-mini .name { font-weight:600; color:var(--text); }
    .partner-mini .bar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .partner-mini .bar-fill { height:100%; background:var(--success); border-radius:2px; transition:width .5s; }

    /* Quick Add */
    .add-sec { background:var(--card); border-radius:var(--r); padding:12px 14px; box-shadow:var(--shadow); border:1px solid var(--border); }
    .sec-title { font-size:13px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .type-row, .amount-row { display:flex; gap:6px; flex-wrap:wrap; }
    .pill { padding:7px 12px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .pill:active { transform:scale(.94); }
    .pill.sel { border-color:var(--accent); background:var(--accent-lt); color:var(--accent); }
    .pill .pi { font-size:14px; }
    .custom-row { display:flex; gap:6px; margin-top:8px; align-items:center; }
    .custom-row.hidden { display:none; }
    .cinput { flex:1; height:34px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); padding:0 10px; font-size:12px; color:var(--text); outline:none; font-family:inherit; min-width:0; }
    .cinput:focus { border-color:var(--accent); }
    .cinput::placeholder { color:var(--text2); }
    .add-btn { width:100%; height:40px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; font-family:inherit; margin-top:8px; }
    .add-btn:active { transform:scale(.97); background:var(--accent-dk); }

    /* History */
    .hist-sec { background:var(--card); border-radius:var(--r); padding:10px 14px; box-shadow:var(--shadow); border:1px solid var(--border); flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
    .hist-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .hist-list { flex:1; overflow-y:auto; min-height:0; }
    .hist-list::-webkit-scrollbar { width:3px; }
    .hist-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .hist-item { display:flex; align-items:center; justify-content:space-between; padding:6px 8px; border-radius:10px; margin-bottom:4px; background:var(--bg); animation:fadeIn .25s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .hist-left { display:flex; align-items:center; gap:8px; }
    .hist-icon { font-size:16px; }
    .hist-amt { font-size:12px; font-weight:500; }
    .hist-type { font-size:10px; color:var(--text2); }
    .hist-time { font-size:10px; color:var(--text2); }
    .hist-del { width:22px; height:22px; border-radius:6px; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
    .hist-del:active { color:var(--danger); }
    .empty-hint { text-align:center; padding:12px; color:var(--text2); font-size:12px; }
    .clear-btn { font-size:10px; color:var(--danger); background:none; border:none; cursor:pointer; padding:2px 8px; border-radius:6px; font-family:inherit; }

    /* Settings Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:flex-end; justify-content:center; transition:opacity .25s; opacity:0; pointer-events:none; }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal { background:var(--card); border-radius:20px 20px 0 0; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; padding:20px 16px 30px; transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
    .modal h2 { font-size:16px; font-weight:700; margin-bottom:14px; }
    .s-group { margin-bottom:16px; }
    .s-label { font-size:12px; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:4px; }
    .s-desc { font-size:10px; color:var(--text2); margin-bottom:4px; line-height:1.4; }
    .s-input { width:100%; height:38px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); padding:0 10px; font-size:12px; color:var(--text); outline:none; font-family:inherit; }
    .s-input:focus { border-color:var(--accent); }
    .s-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .toggle { position:relative; width:42px; height:24px; background:var(--border); border-radius:12px; cursor:pointer; transition:background .25s; flex-shrink:0; }
    .toggle.on { background:var(--accent); }
    .toggle::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform .25s; box-shadow:0 1px 3px rgba(0,0,0,.15); }
    .toggle.on::after { transform:translateX(18px); }
    .s-select { height:34px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg); padding:0 8px; font-size:12px; color:var(--text); outline:none; font-family:inherit; }
    .s-link { display:inline-block; color:var(--accent); font-size:11px; text-decoration:underline; cursor:pointer; }
    .s-btn { height:36px; padding:0 16px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
    .s-btn:active { transform:scale(.96); }
    .partner-status { padding:10px; background:var(--accent-lt); border-radius:10px; font-size:11px; margin-top:8px; line-height:1.5; }

    /* Toast */
    .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--card); border:1px solid var(--border); padding:10px 18px; border-radius:14px; box-shadow:0 6px 30px rgba(0,0,0,.15); z-index:200; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; transition:transform .35s cubic-bezier(.4,0,.2,1); max-width:90vw; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast .ti { font-size:18px; }

    /* Celebration */
    canvas.celeb { position:fixed; inset:0; pointer-events:none; z-index:150; }

    /* Safe area */
    @supports(padding-bottom:env(safe-area-inset-bottom)) { .app { padding-bottom:calc(16px + env(safe-area-inset-bottom)); } }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="hdr">
    <div><h1>今日喝水</h1><div class="hdr-sub" id="dateDisp"></div></div>
    <div class="hdr-r">
      <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
      <button class="icon-btn" id="themeBtn" title="切换主题">🌙</button>
    </div>
  </div>

  <!-- Bottle -->
  <div class="bottle-sec">
    <div class="bottle-wrap">
      <div class="bottle-cap"></div>
      <div class="bottle-body">
        <div class="bottle-ticks" id="bottleTicks"></div>
        <div class="water-fill" id="waterFill">
          <div class="wave-layer wave5"></div>
          <div class="wave-layer wave1"></div>
          <div class="wave-layer wave3"></div>
          <div class="wave-layer wave2"></div>
          <div class="wave-layer wave4"></div>
        </div>
      </div>
      <div class="bottle-glow" id="bottleGlow"></div>
    </div>
    <div class="progress-area">
      <div class="progress-num"><span id="curAmt">0</span><small>ml / 2000ml</small></div>
      <div class="progress-sub" id="progSub">还需 2000ml 达成目标</div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progBar"></div></div>
      <div class="partner-mini" id="partnerMini" style="display:none">
        <span class="name" id="partnerName"></span>
        <span id="partnerAmt">0ml</span>
        <div class="bar"><div class="bar-fill" id="partnerBar"></div></div>
      </div>
    </div>
  </div>

  <!-- Quick Add -->
  <div class="add-sec">
    <div class="sec-title">📝 快速记录</div>
    <div style="margin-bottom:6px"><div class="type-row" id="typeRow"></div>
      <div class="custom-row hidden" id="customTypeRow">
        <input class="cinput" id="customTypeInput" placeholder="输入饮品名称" />
      </div>
    </div>
    <div><div class="amount-row" id="amountRow"></div>
      <div class="custom-row hidden" id="customAmtRow">
        <input class="cinput" id="customAmtInput" type="number" placeholder="毫升数" min="1" max="5000" />
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="doAdd()">记录</button>
  </div>

  <!-- History -->
  <div class="hist-sec">
    <div class="hist-hdr">
      <div class="sec-title" style="margin:0">📋 今日记录</div>
      <button class="clear-btn" onclick="clearHist()">清空</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>设置</h2>

    <!-- Reminder -->
    <div class="s-group">
      <div class="s-label">⏰ 定时提醒</div>
      <div class="s-row" style="margin-bottom:8px">
        <span style="font-size:12px">浏览器提醒</span>
        <div class="toggle" id="reminderToggle" onclick="toggleReminder()"></div>
      </div>
      <div id="reminderCfg" style="opacity:.4;pointer-events:none;transition:all .25s">
        <div class="s-row">
          <span style="font-size:11px;color:var(--text2)">每隔</span>
          <select class="s-select" id="remInterval">
            <option value="30">30分钟</option><option value="60" selected>1小时</option>
            <option value="90">1.5小时</option><option value="120">2小时</option>
          </select>
          <span style="font-size:11px;color:var(--text2)">提醒一次</span>
        </div>
      </div>
    </div>

    <!-- WeChat -->
    <div class="s-group">
      <div class="s-label">💬 微信提醒（Server酱）</div>
      <div class="s-desc">用微信扫码关注「Server酱」公众号，获取 SendKey 后填入下方。免费版每天5条消息。<a class="s-link" href="https://sct.ftqq.com/" target="_blank">去获取 SendKey →</a></div>
      <input class="s-input" id="sctKey" placeholder="填入 Server酱 SendKey" />
      <div class="s-row" style="margin-top:8px">
        <span style="font-size:12px">启用微信提醒</span>
        <div class="toggle" id="wechatToggle" onclick="toggleWechat()"></div>
      </div>
    </div>

    <!-- Sync -->
    <div class="s-group">
      <div class="s-label">👥 亲友同步（GitHub Gist）</div>
      <div class="s-desc">用 GitHub Gist 云端同步数据，可互相查看饮水量。需 GitHub 令牌（勾选 gist 权限）。<a class="s-link" href="https://github.com/settings/tokens/new" target="_blank">创建令牌 →</a></div>
      <input class="s-input" id="ghToken" placeholder="GitHub Personal Access Token（需gist权限）" style="margin-bottom:6px" />
      <div class="s-row" style="margin-bottom:6px">
        <span style="font-size:12px">启用同步</span>
        <div class="toggle" id="syncToggle" onclick="toggleSync()"></div>
      </div>
      <div id="syncCfg" style="opacity:.4;pointer-events:none;transition:all .25s">
        <input class="s-input" id="partnerGistId" placeholder="对方的 Gist ID（对方分享给你）" style="margin-bottom:6px" />
        <div class="s-row">
          <button class="s-btn" onclick="createMyGist()">创建我的 Gist</button>
          <button class="s-btn" onclick="copyMyGistId()" style="background:var(--accent-lt);color:var(--accent)">复制我的 Gist ID</button>
        </div>
        <div class="partner-status" id="syncStatus">尚未配置同步</div>
      </div>
    </div>

    <button class="s-btn" style="width:100%;margin-top:8px" onclick="closeSettings()">完成</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span class="ti" id="toastI">💧</span><span id="toastT"></span></div>
<canvas class="celeb" id="celebCanvas"></canvas>

<script>
// ===== CONSTANTS =====
const GOAL = 2000;
const DRINK_TYPES = [
  { id:'water', name:'矿泉水', icon:'💧' },
  { id:'coffee', name:'咖啡', icon:'☕' },
  { id:'tea', name:'茶', icon:'🍵' },
  { id:'custom', name:'自定义', icon:'✏️' },
];
const AMOUNTS = [
  { val:100, label:'100ml' },
  { val:500, label:'500ml' },
  { val:1000, label:'1000ml' },
  { val:-1, label:'自定义' },
];

// ===== STATE =====
let selType = 'water', selAmount = 500, customType = '', customAmt = 0;
let state = loadState();

function today() { return new Date().toISOString().slice(0,10); }

function loadState() {
  try {
    const s = localStorage.getItem('wr-state');
    if (s) { const p = JSON.parse(s); if (p.date === today()) return p; }
  } catch(e){}
  return { date: today(), amount: 0, records: [] };
}
function save() { state.date = today(); localStorage.setItem('wr-state', JSON.stringify(state)); }

// ===== SETTINGS =====
let cfg = loadCfg();
function loadCfg() {
  try { return JSON.parse(localStorage.getItem('wr-cfg') || '{}'); } catch(e) { return {}; }
}
function saveCfg() { localStorage.setItem('wr-cfg', JSON.stringify(cfg)); }

// ===== RENDER =====
function render() {
  const pct = Math.min(state.amount / GOAL * 100, 100);
  const rem = Math.max(GOAL - state.amount, 0);

  // Water fill with gravity transform
  const waterFill = document.getElementById('waterFill');
  waterFill.style.height = pct + '%';

  document.getElementById('curAmt').textContent = state.amount;
  document.getElementById('progBar').style.width = pct + '%';

  if (state.amount >= GOAL) {
    document.getElementById('progSub').textContent = '目标已达成！';
    document.getElementById('bottleGlow').classList.add('on');
  } else {
    document.getElementById('progSub').textContent = `还需 ${rem}ml 达成目标`;
    document.getElementById('bottleGlow').classList.remove('on');
  }

  renderTicks();
  renderHistory();
  renderPartnerMini();
}

// ===== BOTTLE TICK MARKS =====
function renderTicks() {
  const container = document.getElementById('bottleTicks');
  if (!container) return;
  const bottleH = 110; // bottle body height in px (matches CSS)
  const step = 100; // 100ml per tick
  let html = '';
  for (let ml = 0; ml <= GOAL; ml += step) {
    const pctFromBottom = (ml / GOAL) * 100;
    const bottomPx = (pctFromBottom / 100) * bottleH;
    const isMajor = ml % 500 === 0;
    const tickW = isMajor ? 10 : 5;
    html += `<div class="bottle-tick${isMajor ? ' major' : ''}" style="bottom:${bottomPx}px;width:${tickW}px"></div>`;
    if (isMajor) {
      const label = ml >= 1000 ? (ml / 1000) + 'L' : ml + '';
      html += `<div class="bottle-tick-label" style="bottom:${bottomPx}px">${label}</div>`;
    }
  }
  container.innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('histList');
  if (!state.records.length) { el.innerHTML = '<div class="empty-hint">还没有记录，喝杯水吧 💧</div>'; return; }
  el.innerHTML = state.records.slice().reverse().map((r,i) => {
    const idx = state.records.length - 1 - i;
    return `<div class="hist-item"><div class="hist-left"><span class="hist-icon">${r.icon||'💧'}</span><div><div class="hist-amt">${r.amount}ml ${r.type||''}</div><div class="hist-time">${r.time}</div></div></div><button class="hist-del" onclick="delRec(${idx})">✕</button></div>`;
  }).join('');
}

function renderPartnerMini() {
  const el = document.getElementById('partnerMini');
  if (!partnerData) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  document.getElementById('partnerName').textContent = partnerData.name || '亲友';
  document.getElementById('partnerAmt').textContent = partnerData.amount + 'ml';
  document.getElementById('partnerBar').style.width = Math.min(partnerData.amount / GOAL * 100, 100) + '%';
}

// ===== TYPE / AMOUNT SELECTORS =====
function buildSelectors() {
  // Types
  const tr = document.getElementById('typeRow');
  tr.innerHTML = DRINK_TYPES.map(t =>
    `<div class="pill${t.id===selType?' sel':''}" onclick="pickType('${t.id}')">${t.id!=='custom'?`<span class="pi">${t.icon}</span>`:''}${t.name}</div>`
  ).join('');

  // Amounts
  const ar = document.getElementById('amountRow');
  ar.innerHTML = AMOUNTS.map(a =>
    `<div class="pill${a.val===selAmount?' sel':''}" onclick="pickAmount(${a.val})">${a.label}</div>`
  ).join('');

  // Custom type row
  document.getElementById('customTypeRow').classList.toggle('hidden', selType !== 'custom');
  // Custom amount row
  document.getElementById('customAmtRow').classList.toggle('hidden', selAmount !== -1);
}

function pickType(id) { selType = id; buildSelectors(); }
function pickAmount(v) { selAmount = v; buildSelectors(); }

// ===== ADD =====
function doAdd() {
  const typeObj = DRINK_TYPES.find(t => t.id === selType);
  let typeName = typeObj.name, typeIcon = typeObj.icon;

  if (selType === 'custom') {
    typeName = document.getElementById('customTypeInput').value.trim();
    if (!typeName) { toast('⚠️','请输入饮品名称'); return; }
    typeIcon = '🥤';
  }

  let ml = selAmount;
  if (ml === -1) {
    ml = parseInt(document.getElementById('customAmtInput').value);
    if (!ml || ml <= 0 || ml > 5000) { toast('⚠️','请输入1-5000之间的毫升数'); return; }
  }

  state.amount += ml;
  state.records.push({ amount: ml, type: typeName, icon: typeIcon, time: new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) });
  save();
  render();
  syncToGist();

  if (state.amount >= GOAL && state.amount - ml < GOAL) { toast('🎉','目标达成！'); celebrate(); }
  else if (state.amount >= GOAL*.5 && state.amount - ml < GOAL*.5) toast('💪','已过半！继续加油');
  else if (state.amount >= GOAL*.75 && state.amount - ml < GOAL*.75) toast('🔥','75%了！胜利在望');
  else toast(typeIcon, `+${ml}ml ${typeName}`);
}

function delRec(i) { const r = state.records[i]; state.amount = Math.max(0, state.amount - r.amount); state.records.splice(i,1); save(); render(); syncToGist(); }
function clearHist() { if(!state.records.length) return; state.amount=0; state.records=[]; save(); render(); syncToGist(); toast('🗑️','已清空'); }

// ===== GRAVITY / DEVICE ORIENTATION =====
let gravityAngle = 0;
let targetAngle = 0;
function initGravity() {
  function handleOrientation(e) {
    // gamma: left-right tilt (-90 to 90)
    // When phone tilts right (gamma>0), water surface should tilt left => negative angle
    const gamma = e.gamma || 0;
    targetAngle = Math.max(-15, Math.min(15, -gamma * 0.35));
  }

  // iOS 13+ requires permission
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.body.addEventListener('click', function reqPerm() {
      DeviceOrientationEvent.requestPermission().then(r => {
        if (r === 'granted') window.addEventListener('deviceorientation', handleOrientation);
      }).catch(()=>{});
      document.body.removeEventListener('click', reqPerm);
    }, { once: true });
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
  }

  // Smooth interpolation
  function animateGravity() {
    gravityAngle += (targetAngle - gravityAngle) * 0.08;
    const wf = document.getElementById('waterFill');
    if (wf) {
      // Tilt the water fill container; origin at center bottom so water "pools" correctly
      wf.style.transformOrigin = '50% 100%';
      wf.style.transform = `rotate(${gravityAngle}deg)`;
    }
    requestAnimationFrame(animateGravity);
  }
  animateGravity();
}

// ===== REMINDER =====
let remOn = false, remId = null;
function toggleReminder() {
  remOn = !remOn;
  document.getElementById('reminderToggle').classList.toggle('on', remOn);
  document.getElementById('reminderCfg').style.opacity = remOn ? 1 : .4;
  document.getElementById('reminderCfg').style.pointerEvents = remOn ? 'auto' : 'none';
  cfg.remOn = remOn; saveCfg();
  if (remOn) { reqNotif(); startRem(); toast('⏰','提醒已开启'); } else { stopRem(); toast('🔕','提醒已关闭'); }
}
function reqNotif() { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }
function startRem() {
  stopRem();
  const m = parseInt(document.getElementById('remInterval').value);
  remId = setInterval(() => {
    const rem = GOAL - state.amount; if (rem <= 0) return;
    const msg = `该喝水啦！还需 ${rem}ml 💧`;
    toast('⏰', msg);
    if ('Notification' in window && Notification.permission === 'granted') new Notification('喝水提醒💧',{body:msg});
    // WeChat push
    if (cfg.wechatOn && cfg.sctKey) pushWechat(msg);
  }, m * 60000);
}
function stopRem() { if (remId) { clearInterval(remId); remId = null; } }

// ===== WECHAT (Server酱) =====
function toggleWechat() {
  cfg.wechatOn = !cfg.wechatOn;
  document.getElementById('wechatToggle').classList.toggle('on', cfg.wechatOn);
  saveCfg();
  toast(cfg.wechatOn ? '💬' : '🔕', cfg.wechatOn ? '微信提醒已开启' : '微信提醒已关闭');
}
async function pushWechat(msg) {
  if (!cfg.sctKey) return;
  try {
    await fetch(`https://sctapi.ftqq.com/${cfg.sctKey}.send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `title=${encodeURIComponent('喝水提醒💧')}&desp=${encodeURIComponent(msg)}`
    });
  } catch(e) {}
}

// ===== SYNC (GitHub Gist) =====
let partnerData = null;

function toggleSync() {
  cfg.syncOn = !cfg.syncOn;
  document.getElementById('syncToggle').classList.toggle('on', cfg.syncOn);
  document.getElementById('syncCfg').style.opacity = cfg.syncOn ? 1 : .4;
  document.getElementById('syncCfg').style.pointerEvents = cfg.syncOn ? 'auto' : 'none';
  saveCfg();
  if (cfg.syncOn) { startSyncLoop(); toast('👥','同步已开启'); } else { toast('🔕','同步已关闭'); }
}

async function ghApi(method, path, body) {
  const token = cfg.ghToken;
  if (!token) return null;
  const opts = { method, headers: { 'User-Agent':'WaterReminder', 'Authorization':`token ${token}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`https://api.github.com${path}`, opts);
  return res.json();
}

async function createMyGist() {
  if (!cfg.ghToken) { toast('⚠️','请先填写 GitHub 令牌'); return; }
  const data = { date: today(), amount: state.amount, name: cfg.myName || '我' };
  try {
    if (cfg.myGistId) {
      // Update existing
      await ghApi('PATCH', `/gists/${cfg.myGistId}`, {
        files: { 'water-data.json': { content: JSON.stringify(data) } }
      });
      toast('✅','Gist 已更新');
    } else {
      // Create new
      const res = await ghApi('POST', '/gists', {
        description: '喝水提醒同步数据',
        public: true,
        files: { 'water-data.json': { content: JSON.stringify(data) } }
      });
      if (res && res.id) {
        cfg.myGistId = res.id;
        saveCfg();
        toast('✅','Gist 创建成功！把 ID 分享给亲友');
      } else {
        toast('⚠️','创建失败，请检查令牌权限');
      }
    }
  } catch(e) { toast('⚠️','同步出错: ' + e.message); }
  updateSyncStatus();
}

async function syncToGist() {
  if (!cfg.syncOn || !cfg.ghToken || !cfg.myGistId) return;
  const data = { date: today(), amount: state.amount, name: cfg.myName || '我' };
  try {
    await ghApi('PATCH', `/gists/${cfg.myGistId}`, {
      files: { 'water-data.json': { content: JSON.stringify(data) } }
    });
  } catch(e) {}
}

async function fetchPartner() {
  const gistId = cfg.partnerGistId;
  if (!gistId) return;
  try {
    // Read public gist without auth
    const res = await fetch(`https://api.github.com/gists/${gistId}`);
    const data = await res.json();
    if (data.files && data.files['water-data.json']) {
      const content = JSON.parse(data.files['water-data.json'].content);
      // Only show today's data
      if (content.date === today()) {
        partnerData = { name: content.name || '亲友', amount: content.amount || 0 };
      } else {
        partnerData = { name: content.name || '亲友', amount: 0 };
      }
      renderPartnerMini();
    }
  } catch(e) {}
}

let syncLoop = null;
function startSyncLoop() {
  if (syncLoop) clearInterval(syncLoop);
  syncToGist();
  fetchPartner();
  syncLoop = setInterval(() => { syncToGist(); fetchPartner(); }, 30000); // every 30s
}

function copyMyGistId() {
  if (!cfg.myGistId) { toast('⚠️','请先创建 Gist'); return; }
  navigator.clipboard.writeText(cfg.myGistId).then(() => toast('📋','Gist ID 已复制'));
}

function updateSyncStatus() {
  const el = document.getElementById('syncStatus');
  const parts = [];
  if (cfg.myGistId) parts.push(`我的 Gist ID: ${cfg.myGistId.slice(0,8)}...`);
  if (cfg.partnerGistId) parts.push(`对方 Gist ID: ${cfg.partnerGistId.slice(0,8)}...`);
  el.textContent = parts.length ? parts.join('\n') : '尚未配置同步';
}

// ===== SETTINGS MODAL =====
function openSettings() {
  // Restore values
  document.getElementById('sctKey').value = cfg.sctKey || '';
  document.getElementById('ghToken').value = cfg.ghToken || '';
  document.getElementById('partnerGistId').value = cfg.partnerGistId || '';
  document.getElementById('reminderToggle').classList.toggle('on', cfg.remOn);
  document.getElementById('wechatToggle').classList.toggle('on', cfg.wechatOn);
  document.getElementById('syncToggle').classList.toggle('on', cfg.syncOn);
  document.getElementById('reminderCfg').style.opacity = cfg.remOn ? 1 : .4;
  document.getElementById('reminderCfg').style.pointerEvents = cfg.remOn ? 'auto' : 'none';
  document.getElementById('syncCfg').style.opacity = cfg.syncOn ? 1 : .4;
  document.getElementById('syncCfg').style.pointerEvents = cfg.syncOn ? 'auto' : 'none';
  remOn = cfg.remOn;
  updateSyncStatus();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeSettings() {
  // Save values
  cfg.sctKey = document.getElementById('sctKey').value.trim();
  cfg.ghToken = document.getElementById('ghToken').value.trim();
  cfg.partnerGistId = document.getElementById('partnerGistId').value.trim();
  saveCfg();
  if (cfg.syncOn) startSyncLoop();
  document.getElementById('modalOverlay').classList.remove('open');
}

// ===== TOAST =====
let toastTm;
function toast(icon, text) {
  clearTimeout(toastTm);
  const t = document.getElementById('toast');
  document.getElementById('toastI').textContent = icon;
  document.getElementById('toastT').textContent = text;
  t.classList.add('show');
  toastTm = setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== CELEBRATE =====
function celebrate() {
  const c = document.getElementById('celebCanvas'), ctx = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const ps = [], cols = ['#44b8ff','#36d399','#fbbf24','#f87171','#a78bfa','#fb923c'];
  for (let i=0;i<60;i++) ps.push({ x:Math.random()*c.width, y:c.height+10, vx:(Math.random()-.5)*7, vy:-(Math.random()*10+5), s:Math.random()*5+2, c:cols[Math.floor(Math.random()*cols.length)], a:1, g:.14, r:Math.random()*360, rs:(Math.random()-.5)*8 });
  let f=0;
  (function anim(){
    ctx.clearRect(0,0,c.width,c.height); let alive=false;
    ps.forEach(p=>{ if(p.a<=0)return; alive=true; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.a-=.01; p.r+=p.rs; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180); ctx.globalAlpha=Math.max(0,p.a); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); ctx.restore(); });
    f++; if(alive&&f<180) requestAnimationFrame(anim); else ctx.clearRect(0,0,c.width,c.height);
  })();
}

// ===== THEME =====
function initTheme() {
  if (localStorage.getItem('wr-theme') === 'dark') { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = '☀️'; }
  document.getElementById('themeBtn').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    const d = document.body.classList.contains('dark');
    document.getElementById('themeBtn').textContent = d ? '☀️' : '🌙';
    localStorage.setItem('wr-theme', d ? 'dark' : 'light');
  });
}

// ===== INIT =====
(function init() {
  // Date
  const now = new Date();
  document.getElementById('dateDisp').textContent = now.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});

  // Theme
  initTheme();

  // Build selectors
  buildSelectors();

  // Settings modal
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });

  // Reminder interval change
  document.getElementById('remInterval').addEventListener('change', () => { if (remOn) startRem(); });

  // Restore reminder
  if (cfg.remOn) { remOn = true; startRem(); }

  // Restore sync
  if (cfg.syncOn) startSyncLoop();

  // Gravity
  initGravity();

  // Enter key for custom inputs
  document.getElementById('customAmtInput').addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
  document.getElementById('customTypeInput').addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

  // Render
  render();
})();
</script>
